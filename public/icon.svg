<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#17184B"/>
      <stop offset="100%" style="stop-color:#5254BA"/>
    </linearGradient>
    <radialGradient id="glow1" cx="75%" cy="25%" r="50%">
      <stop offset="0%" style="stop-color:#D6B4FC;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#D6B4FC;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="25%" cy="75%" r="40%">
      <stop offset="0%" style="stop-color:#7C7FDB;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#7C7FDB;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <!-- Fondo con esquinas redondeadas estilo iOS -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>
  <!-- Formas fluidas decorativas -->
  <ellipse cx="400" cy="120" rx="200" ry="170" fill="url(#glow1)" transform="rotate(-15 400 120)"/>
  <ellipse cx="115" cy="400" rx="160" ry="130" fill="url(#glow2)" transform="rotate(10 115 400)"/>
  <!-- La S de Sinkply — itálica, refinada -->
  <text
    x="258"
    y="360"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="330"
    font-weight="400"
    font-style="italic"
    text-anchor="middle"
    fill="#F7F5FF"
    opacity="0.97">S</text>
  <!-- Punto wasabi (acento de marca) -->
  <circle cx="348" cy="378" r="20" fill="#E9F056"/>
</svg>
