<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Sinkply</title>
<meta name="description" content="Calculadora de comisiones para estudios de tatuaje"/>

<!-- PWA -->
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#273287"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Sinkply"/>
<link rel="apple-touch-icon" href="/icon-512.png"/>

<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F5FF;--v900:#17184B;--v800:#273287;--v700:#3D3FA0;--v600:#5254BA;--v500:#7C7FDB;--v200:#E8E8FB;
  --wd:#5a5e00;--wbg:rgba(233,240,86,0.16);--wbd:rgba(160,168,0,0.28);
  --txt:#1a1a3e;--txt2:#4a4a7a;--txt3:#8888aa;
  --r:20px;--rxs:8px;
  --fh:'Instrument Serif',serif;--fb:'Plus Jakarta Sans',sans-serif;--fn:'DM Mono',monospace;
}
body{font-family:var(--fb);background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden;position:relative}

/* FONDO FLUIDO */
.bg-s{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-s::before{content:'';position:absolute;width:700px;height:700px;border-radius:60% 40% 55% 45%/45% 55% 40% 60%;background:radial-gradient(ellipse at 40% 40%,rgba(214,180,252,0.4) 0%,rgba(168,169,232,0.15) 50%,transparent 75%);top:-180px;right:-120px;animation:mA 18s ease-in-out infinite alternate}
.bg-s::after{content:'';position:absolute;width:500px;height:500px;border-radius:45% 55% 60% 40%/55% 40% 65% 35%;background:radial-gradient(ellipse,rgba(82,84,186,0.1) 0%,transparent 70%);bottom:-100px;left:-80px;animation:mB 22s ease-in-out infinite alternate}
@keyframes mA{0%{transform:translate(0,0);border-radius:60% 40% 55% 45%/45% 55% 40% 60%}100%{transform:translate(20px,-30px);border-radius:40% 60% 45% 55%/60% 40% 55% 45%}}
@keyframes mB{0%{transform:translate(0,0)}100%{transform:translate(-15px,25px)}}

.app{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:24px 16px 100px}

/* GLASS CARD */
.gc{background:rgba(255,255,255,0.88);border:1.5px solid rgba(124,127,219,0.2);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:var(--r);box-shadow:0 4px 24px rgba(39,50,135,0.07),0 1px 0 rgba(255,255,255,0.95) inset}

/* BOTONES */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;font-family:var(--fb);font-size:13px;font-weight:700;cursor:pointer;border-radius:100px;padding:10px 22px;transition:all .25s cubic-bezier(.34,1.56,.64,1);border:none}
.btn-p{background:linear-gradient(135deg,var(--v900),var(--v700));color:#fff;box-shadow:0 4px 18px rgba(39,50,135,0.3);border:1.5px solid rgba(82,84,186,0.4)}
.btn-p:hover{transform:translateY(-2px) scale(1.03);box-shadow:0 10px 28px rgba(39,50,135,0.4)}
.btn-p:active{transform:scale(0.96)}
.btn-g{background:rgba(124,127,219,0.12);border:1.5px solid rgba(82,84,186,0.32);color:var(--v800);backdrop-filter:blur(12px);box-shadow:0 2px 12px rgba(82,84,186,0.1),0 1px 0 rgba(255,255,255,0.85) inset}
.btn-g:hover{background:rgba(124,127,219,0.22);border-color:rgba(82,84,186,0.55);transform:translateY(-2px) scale(1.03);box-shadow:0 8px 22px rgba(82,84,186,0.2)}
.btn-g:active{transform:scale(0.96)}
.btn-d{background:rgba(239,68,68,0.08);border:1.5px solid rgba(239,68,68,0.28);color:#b91c1c}
.btn-d:hover{background:rgba(239,68,68,0.16);transform:scale(1.04)}
.sm{padding:7px 16px;font-size:12px}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.logo{font-family:var(--fh);font-size:34px;font-style:italic;color:var(--v800)}

/* TABS */
.nwrap{background:rgba(255,255,255,0.72);border:1.5px solid rgba(124,127,219,0.16);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:100px;padding:5px;display:flex;gap:4px;margin-bottom:22px}
.ntab{flex:1;padding:9px 8px;border-radius:100px;border:none;background:transparent;color:var(--txt3);font-family:var(--fb);font-size:13px;font-weight:700;cursor:pointer;transition:all .22s;text-align:center}
.ntab.active{background:linear-gradient(135deg,var(--v900),var(--v700));color:#fff;box-shadow:0 4px 14px rgba(39,50,135,0.25)}
.ntab:hover:not(.active){background:rgba(124,127,219,0.1);color:var(--v700)}

/* DATE BAR */
.dbar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.nb{width:36px;height:36px;border-radius:50%;border:1.5px solid rgba(82,84,186,0.22);background:rgba(124,127,219,0.09);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .22s;color:var(--v700)}
.nb:hover{background:rgba(82,84,186,0.16);border-color:rgba(82,84,186,0.42);transform:scale(1.12);box-shadow:0 4px 12px rgba(82,84,186,0.14)}
.dlbl{font-family:var(--fh);font-size:19px;font-style:italic;color:var(--txt);min-width:130px;text-align:center}
.dinp{background:rgba(255,255,255,0.85);border:1.5px solid rgba(124,127,219,0.2);border-radius:var(--rxs);padding:7px 12px;color:var(--txt);font-size:13px;font-family:var(--fb);font-weight:600;outline:none;color-scheme:light}

/* SETTINGS */
.spanel{padding:16px 20px;margin-bottom:16px}
.srow{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.sgrp{display:flex;align-items:center;gap:10px;flex:1;min-width:180px}
.slbl{font-size:11px;font-weight:800;color:var(--v600);text-transform:uppercase;letter-spacing:.8px;white-space:nowrap}
.spv{font-family:var(--fn);font-size:13px;font-weight:500;color:var(--v800);min-width:100px}
input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:4px;background:var(--v200);border-radius:2px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:linear-gradient(135deg,var(--v800),var(--v500));border:2px solid #fff;box-shadow:0 2px 8px rgba(82,84,186,0.32);cursor:pointer;transition:transform .15s}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.2)}
.ivab{background:rgba(255,255,255,0.9);border:1.5px solid rgba(124,127,219,0.22);border-radius:var(--rxs);padding:6px 10px;width:56px;text-align:center;color:var(--v800);font-size:14px;font-weight:600;font-family:var(--fn);outline:none}
.qrow{display:flex;gap:6px;flex-wrap:wrap}
.qb{padding:6px 14px;border-radius:100px;border:1.5px solid rgba(82,84,186,0.2);background:rgba(255,255,255,0.72);color:var(--v700);font-size:12px;font-weight:800;cursor:pointer;transition:all .22s;font-family:var(--fb)}
.qb:hover{border-color:rgba(82,84,186,0.42);background:rgba(124,127,219,0.1);transform:translateY(-1px)}
.qb.active{background:linear-gradient(135deg,var(--v900),var(--v700));border-color:transparent;color:#fff;box-shadow:0 4px 12px rgba(39,50,135,0.22)}

/* SUMMARY */
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.sc{padding:16px 18px;border-radius:var(--r);text-align:center;transition:transform .22s cubic-bezier(.34,1.56,.64,1)}
.sc:hover{transform:translateY(-4px)}
.sc-main{background:linear-gradient(135deg,var(--v900),var(--v700));border:none;box-shadow:0 8px 28px rgba(39,50,135,0.28)}
.sc-main .sl{color:rgba(255,255,255,0.6)}.sc-main .sv{color:#fff}
.sc-iva{background:var(--wbg);border:1.5px solid var(--wbd)}.sc-iva .sv{color:var(--wd)}
.sc-s{background:rgba(82,84,186,0.07);border:1.5px solid rgba(82,84,186,0.16)}.sc-s .sv{color:var(--v800)}
.sc-a{background:rgba(255,255,255,0.88);border:1.5px solid rgba(124,127,219,0.2)}.sc-a .sv{color:var(--v700)}
.sl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--txt3);margin-bottom:7px}
.sv{font-family:var(--fn);font-size:21px;font-weight:500;letter-spacing:-.5px}

/* SECTION */
.sechdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.secttl{font-family:var(--fh);font-size:18px;font-style:italic;color:var(--txt)}

/* EMPTY STATE */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:16px}
.empty-plus{width:72px;height:72px;border-radius:50%;border:2px dashed rgba(124,127,219,0.35);background:rgba(124,127,219,0.06);display:flex;align-items:center;justify-content:center;font-size:32px;color:rgba(124,127,219,0.5);font-weight:300;line-height:1;transition:all .22s;cursor:pointer;user-select:none}
.empty-plus:hover{border-color:rgba(82,84,186,0.6);background:rgba(124,127,219,0.12);color:var(--v700);transform:scale(1.08)}
.empty-txt{font-size:15px;font-weight:600;color:var(--txt3);text-align:center}
.empty-sub{font-size:13px;color:rgba(136,136,170,0.7);text-align:center}

/* ARTIST CARD */
.acard{margin-bottom:12px;overflow:hidden;transition:transform .22s}
.acard:hover{transform:translateY(-1px)}
.ahdr{display:flex;align-items:center;gap:14px;padding:16px 20px;cursor:pointer;transition:background .15s;user-select:none}
.ahdr:hover{background:rgba(124,127,219,0.04)}
.avt{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--v800),var(--v500));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0;box-shadow:0 4px 12px rgba(82,84,186,0.22)}
.ain{flex:1;min-width:0}
.aname{font-size:15px;font-weight:800;color:var(--txt)}
.asub{font-size:11px;color:var(--txt3);margin-top:2px;font-weight:600}
.aearns{text-align:right;flex-shrink:0}
.aval{font-family:var(--fn);font-size:19px;font-weight:500;color:var(--v800)}
.albl{font-size:10px;color:var(--txt3);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.exi{font-size:11px;color:var(--txt3);transition:transform .22s;flex-shrink:0}
.exi.open{transform:rotate(90deg);color:var(--v600)}

/* TATTOO TABLE */
.ttbl{border-top:1.5px solid rgba(124,127,219,0.1);padding:0 20px 16px}
.tthd{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 56px;gap:8px;padding:10px 0 6px;border-bottom:1.5px solid rgba(124,127,219,0.1)}
.tthd span{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--txt3)}
.ttrow{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 56px;gap:8px;align-items:center;padding:10px 0;border-bottom:1px solid rgba(124,127,219,0.07)}
.ttrow:last-of-type{border-bottom:none}
.ttn{font-size:13px;font-weight:700;color:var(--txt)}
.ttd{font-size:11px;color:var(--txt3);margin-top:2px;font-weight:500}
.chip{font-size:11px;font-weight:700;padding:4px 10px;border-radius:100px;text-align:center;white-space:nowrap;font-family:var(--fn)}
.ci{background:var(--wbg);color:var(--wd);border:1px solid var(--wbd)}
.cs{background:rgba(82,84,186,0.09);color:var(--v800);border:1px solid rgba(82,84,186,0.18)}
.ca{background:rgba(124,127,219,0.1);color:var(--v700);border:1px solid rgba(124,127,219,0.22)}
.ttacts{display:flex;gap:4px;justify-content:flex-end}
.ib{width:28px;height:28px;border-radius:var(--rxs);border:1.5px solid rgba(124,127,219,0.18);background:rgba(255,255,255,0.72);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .22s;color:var(--txt3)}
.ib:hover{border-color:rgba(82,84,186,0.42);color:var(--v700);background:rgba(124,127,219,0.1);transform:scale(1.14)}
.ib.del:hover{border-color:rgba(185,28,28,0.32);color:#b91c1c;background:rgba(239,68,68,0.07)}
.addtt{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--v600);cursor:pointer;font-size:13px;font-weight:700;padding:10px 0 2px;transition:all .2s;font-family:var(--fb)}
.addtt:hover{color:var(--v800);transform:translateX(4px)}

/* ARTIST FOOTER */
.afooter{padding:12px 20px;border-top:1.5px solid rgba(124,127,219,0.1);background:rgba(124,127,219,0.03);display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.fp{padding:5px 12px;border-radius:100px;font-size:12px;font-weight:700;font-family:var(--fn)}
.liqb{margin-left:auto;font-size:12px;font-weight:700;padding:6px 14px;border-radius:100px;font-family:var(--fb);background:rgba(82,84,186,0.1);color:var(--v800);border:1.5px solid rgba(82,84,186,0.22)}

/* HISTORY */
.hcard{padding:16px 20px;margin-bottom:10px;border-radius:var(--r)}
.hdate{font-family:var(--fh);font-size:15px;font-style:italic;color:var(--txt)}
.hchips{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.hpill{padding:4px 12px;border-radius:100px;font-size:12px;font-weight:700;font-family:var(--fn)}
.arow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:13px;border-bottom:1px solid rgba(124,127,219,0.07)}
.arow:last-child{border-bottom:none}

/* ARTIST FILTER */
.afrow{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.afbtn{padding:7px 16px;border-radius:100px;border:1.5px solid rgba(124,127,219,0.2);background:rgba(255,255,255,0.72);color:var(--txt2);font-size:12px;font-weight:700;cursor:pointer;transition:all .22s;font-family:var(--fb)}
.afbtn:hover{border-color:rgba(82,84,186,0.38);background:rgba(124,127,219,0.1);transform:translateY(-1px)}
.afbtn.active{background:linear-gradient(135deg,var(--v900),var(--v700));border-color:transparent;color:#fff;box-shadow:0 4px 12px rgba(39,50,135,0.2)}

/* MODAL */
.mov{position:fixed;inset:0;background:rgba(39,50,135,0.28);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.mbox{background:rgba(247,245,255,0.97);border:1.5px solid rgba(124,127,219,0.28);backdrop-filter:blur(30px);border-radius:24px;padding:28px;width:100%;max-width:480px;box-shadow:0 32px 80px rgba(39,50,135,0.18);animation:su .22s cubic-bezier(.34,1.56,.64,1)}
@keyframes su{from{opacity:0;transform:translateY(18px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.mttl{font-family:var(--fh);font-size:24px;font-style:italic;color:var(--txt);margin-bottom:4px}
.msub{font-size:12px;color:var(--txt3);font-weight:500;margin-bottom:20px;line-height:1.5;padding:8px 10px;background:rgba(124,127,219,0.07);border-radius:8px;border-left:3px solid rgba(82,84,186,0.4)}
.ptoggle{display:flex;gap:6px;margin-bottom:18px}
.popt{flex:1;padding:10px 8px;border-radius:12px;border:1.5px solid rgba(124,127,219,0.22);background:rgba(255,255,255,0.7);cursor:pointer;font-family:var(--fb);font-size:12px;font-weight:700;color:var(--txt2);transition:all .22s;text-align:center;line-height:1.5}
.popt:hover{border-color:rgba(82,84,186,0.4);background:rgba(124,127,219,0.08)}
.popt.active{background:linear-gradient(135deg,var(--v900),var(--v700));border-color:transparent;color:#fff;box-shadow:0 4px 12px rgba(39,50,135,0.22)}
.mf{margin-bottom:14px}
.mlbl{display:block;font-size:11px;font-weight:800;color:var(--v600);text-transform:uppercase;letter-spacing:.7px;margin-bottom:7px}
.mnote{font-size:10px;color:var(--txt3);font-weight:500;text-transform:none;letter-spacing:0;margin-left:6px}
.minp{width:100%;background:rgba(255,255,255,0.9);border:1.5px solid rgba(124,127,219,0.22);border-radius:12px;padding:12px 16px;font-size:15px;color:var(--txt);outline:none;transition:all .2s;font-family:var(--fn);font-weight:500}
.minp::placeholder{color:var(--txt3);font-family:var(--fb);font-weight:400;font-size:14px}
.minp:focus{border-color:rgba(82,84,186,0.5);box-shadow:0 0 0 3px rgba(124,127,219,0.1)}
.mresbox{background:rgba(124,127,219,0.07);border:1.5px solid rgba(82,84,186,0.15);border-radius:14px;padding:16px;margin:16px 0}
.rrow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:13px}
.rl{color:var(--txt3);font-weight:600}
.rv{font-family:var(--fn);font-weight:500;color:var(--txt);font-size:14px}
.rrow.big .rv{font-size:17px;color:var(--v800)}
.rdiv{height:1px;background:rgba(82,84,186,0.1);margin:8px 0}
.liqbox{margin-top:4px;padding:12px 14px;border-radius:10px;display:flex;align-items:center;justify-content:space-between;gap:10px;background:rgba(82,84,186,0.08);border:1.5px solid rgba(82,84,186,0.2)}
.liqtxt{font-size:13px;font-weight:700;color:var(--v800)}
.liqsub{font-size:11px;color:var(--txt3);margin-top:2px}
.liqamt{font-family:var(--fn);font-size:20px;font-weight:500;color:var(--v800);white-space:nowrap}
.mfoot{display:flex;gap:10px;margin-top:4px}
.mcanc{flex:1;padding:13px;border:1.5px solid rgba(124,127,219,0.22);border-radius:14px;background:rgba(255,255,255,0.8);cursor:pointer;font-size:14px;font-weight:700;color:var(--txt2);transition:all .2s;font-family:var(--fb)}
.mcanc:hover{background:rgba(124,127,219,0.08)}
.msave{flex:2;padding:13px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--v900),var(--v700));cursor:pointer;font-size:14px;font-weight:800;color:#fff;transition:all .25s cubic-bezier(.34,1.56,.64,1);font-family:var(--fb);box-shadow:0 4px 16px rgba(39,50,135,0.26)}
.msave:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 8px 24px rgba(39,50,135,0.36)}
.msave:active{transform:scale(0.97)}

/* PRINT */
@media print{
  body{background:#fff!important}
  .bg-s,.no-print{display:none!important}
  .gc,.acard,.sc{background:white!important;border-color:#ddd!important;box-shadow:none!important;backdrop-filter:none!important}
  .mov{display:none!important}
  .ph{display:block!important}
  .acard>div[id^="ab-"]{display:block!important}
}
.ph{display:none;text-align:center;margin-bottom:18px;padding-bottom:14px;border-bottom:2px solid #273287}
</style>
</head>
<body>

<div class="bg-s"></div>

<div class="app">

  <!-- CABECERA IMPRESIÓN -->
  <div class="ph">
    <div style="font-family:'Instrument Serif',serif;font-size:28px;font-style:italic;color:#273287">Sinkply</div>
    <div style="font-size:14px;color:#8888aa;margin-top:4px" id="ph-d"></div>
  </div>

  <!-- HEADER -->
  <div class="hdr no-print">
    <div class="logo">Sinkply</div>
    <button class="btn btn-p sm" onclick="printDay()">Imprimir día</button>
  </div>

  <!-- TABS -->
  <div class="nwrap no-print">
    <button class="ntab active" onclick="setV('dia')" id="t-dia">Día</button>
    <button class="ntab" onclick="setV('semana')" id="t-semana">Semana</button>
    <button class="ntab" onclick="setV('mes')" id="t-mes">Mes</button>
    <button class="ntab" onclick="setV('artistas')" id="t-artistas">Artistas</button>
  </div>

  <!-- VISTA DÍA -->
  <div id="v-dia">
    <div class="gc dbar">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="nb" onclick="chDay(-1)">&#8592;</button>
        <div class="dlbl" id="dlbl">Hoy</div>
        <button class="nb" onclick="chDay(1)">&#8594;</button>
      </div>
      <input type="date" class="dinp no-print" id="dpick" onchange="setD(this.value)"/>
    </div>

    <div class="gc spanel no-print" style="margin-bottom:16px">
      <div class="srow">
        <div class="sgrp">
          <span class="slbl">Split</span>
          <input type="range" id="sslider" min="0" max="100" value="30" oninput="upSplit(this.value)"/>
          <span class="spv" id="spvEl">30% · 70%</span>
        </div>
        <div class="qrow">
          <button class="qb active" onclick="setSplit(30)">30/70</button>
          <button class="qb" onclick="setSplit(40)">40/60</button>
          <button class="qb" onclick="setSplit(50)">50/50</button>
          <button class="qb" onclick="setSplit(60)">60/40</button>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
          <span class="slbl">IVA</span>
          <input type="number" class="ivab" id="ivainp" value="21" min="0" max="50" oninput="save()"/>
          <span class="slbl">%</span>
        </div>
      </div>
    </div>

    <div class="sgrid" id="sg"></div>
    <div class="sechdr">
      <span class="secttl">Artistas del día</span>
      <button class="btn btn-g sm no-print" onclick="openAA()">+ Artista</button>
    </div>
    <div id="alist"></div>
  </div>

  <!-- VISTA SEMANA -->
  <div id="v-semana" style="display:none">
    <div class="gc dbar" style="margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="nb" onclick="chWeek(-1)">&#8592;</button>
        <div class="dlbl" id="wlbl">Esta semana</div>
        <button class="nb" onclick="chWeek(1)">&#8594;</button>
      </div>
    </div>
    <div class="sgrid" id="sg-s"></div>
    <div class="sechdr"><span class="secttl">Filtrar por artista</span></div>
    <div class="afrow" id="af-s"></div>
    <div id="hist-s"></div>
  </div>

  <!-- VISTA MES -->
  <div id="v-mes" style="display:none">
    <div class="gc dbar" style="margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="nb" onclick="chMonth(-1)">&#8592;</button>
        <div class="dlbl" id="mlbl">Este mes</div>
        <button class="nb" onclick="chMonth(1)">&#8594;</button>
      </div>
    </div>
    <div class="sgrid" id="sg-m"></div>
    <div class="sechdr" style="margin-top:4px"><span class="secttl">Filtrar por artista</span></div>
    <div class="afrow" id="af-m"></div>
    <div id="hist-m"></div>
  </div>

  <!-- VISTA ARTISTAS -->
  <div id="v-artistas" style="display:none">
    <div class="sechdr">
      <span class="secttl">Artistas</span>
      <button class="btn btn-g sm" onclick="openAA()">+ Artista</button>
    </div>
    <div id="amgr"></div>
  </div>

</div><!-- /app -->

<!-- MODAL TATUAJE -->
<div class="mov" id="ttm" style="display:none" onclick="if(event.target===this)closeTT()">
  <div class="mbox">
    <div class="mttl" id="mttl">Nuevo tatuaje</div>
    <div class="msub">El cliente siempre paga al estudio. El estudio descuenta IVA y paga al artista su parte.</div>
    <div class="mf">
      <label class="mlbl">Forma de cobro</label>
      <div class="ptoggle">
        <button class="popt active" id="opt-t" onclick="setPM('total')">
          Pago único al estudio<br>
          <span style="font-size:10px;opacity:.7">datáfono o efectivo completo</span>
        </button>
        <button class="popt" id="opt-m" onclick="setPM('mixto')">
          Depósito + resto<br>
          <span style="font-size:10px;opacity:.7">dos pagos al estudio</span>
        </button>
      </div>
    </div>
    <div id="mode-t">
      <div class="mf">
        <label class="mlbl">Total cobrado <span class="mnote">IVA sobre todo el importe</span></label>
        <input type="number" class="minp" id="m-tot" placeholder="250" min="0" oninput="calcM()"/>
      </div>
    </div>
    <div id="mode-m" style="display:none">
      <div class="mf">
        <label class="mlbl">Depósito datáfono/transfer <span class="mnote">IVA solo aquí</span></label>
        <input type="number" class="minp" id="m-dep" placeholder="50" min="0" oninput="calcM()"/>
      </div>
      <div class="mf">
        <label class="mlbl">Resto en efectivo al estudio</label>
        <input type="number" class="minp" id="m-res" placeholder="200" min="0" oninput="calcM()"/>
      </div>
    </div>
    <div id="mres" style="display:none"></div>
    <div class="mfoot">
      <button class="mcanc" onclick="closeTT()">Cancelar</button>
      <button class="msave" onclick="saveTT()">Guardar</button>
    </div>
  </div>
</div>

<!-- MODAL AÑADIR ARTISTA -->
<div class="mov" id="aam" style="display:none" onclick="if(event.target===this)this.style.display='none'">
  <div class="mbox" style="max-width:360px">
    <div class="mttl">Añadir artista</div>
    <div class="mf">
      <label class="mlbl">Nombre</label>
      <input type="text" class="minp" id="aan" placeholder="Nombre del artista" style="font-family:var(--fb)"/>
    </div>
    <div class="mf">
      <label class="mlbl">Split % estudio <span class="mnote">vacío = global</span></label>
      <input type="number" class="minp" id="aas" placeholder="30" min="0" max="100"/>
    </div>
    <div class="mfoot">
      <button class="mcanc" onclick="document.getElementById('aam').style.display='none'">Cancelar</button>
      <button class="msave" onclick="doAA()">Añadir</button>
    </div>
  </div>
</div>

<script>
// ─── ESTADO ───────────────────────────────────────────────────
let S = {
  gs: 30, iva: 21, cd: td(),
  wo: 0, mo: 0,
  artists: [], tats: {},
  cv: 'dia', fS: null, fM: null
};
let eA = null, eT = null, pm = 'total';

function td() { return new Date().toISOString().split('T')[0]; }
function load() { try { const x = localStorage.getItem('sinkply'); if (x) S = { ...S, ...JSON.parse(x) }; } catch(e) {} }
function save() {
  S.iva = parseFloat(document.getElementById('ivainp').value) || 21;
  localStorage.setItem('sinkply', JSON.stringify(S));
  render();
}

// ─── LÓGICA DE CÁLCULO ────────────────────────────────────────
// El cliente SIEMPRE paga al estudio. Nunca al artista directamente.
// CASO 1 — Pago único: IVA sobre el total cobrado.
// CASO 2 — Mixto: IVA SOLO sobre el depósito (datáfono); el resto efectivo no lleva IVA.
function calcLogic(mode, tot, dep, res, sp, iv) {
  const f = 1 + iv / 100;
  let ivaAmt, base;
  if (mode === 'total') {
    const net = tot / f;
    ivaAmt = tot - net;
    base = net;
  } else {
    const dn = dep / f;
    ivaAmt = dep - dn;
    base = dn + res;
  }
  return { ivaAmt, base, ss: base * (sp / 100), as: base * ((100 - sp) / 100) };
}

// ─── MODAL TATUAJE ────────────────────────────────────────────
function setPM(m) {
  pm = m;
  document.getElementById('mode-t').style.display = m === 'total' ? 'block' : 'none';
  document.getElementById('mode-m').style.display = m === 'mixto' ? 'block' : 'none';
  document.getElementById('opt-t').classList.toggle('active', m === 'total');
  document.getElementById('opt-m').classList.toggle('active', m === 'mixto');
  calcM();
}

function calcM() {
  const iv = parseFloat(document.getElementById('ivainp').value) || 21;
  const art = S.artists.find(x => x.id === eA);
  const sp = art && art.cs != null ? art.cs : S.gs;
  let tot = 0, dep = 0, res = 0, valid = false;
  if (pm === 'total') {
    tot = parseFloat(document.getElementById('m-tot').value) || 0;
    valid = tot > 0;
  } else {
    dep = parseFloat(document.getElementById('m-dep').value) || 0;
    res = parseFloat(document.getElementById('m-res').value) || 0;
    valid = dep > 0 || res > 0;
  }
  if (!valid) { document.getElementById('mres').style.display = 'none'; return; }
  const r = calcLogic(pm, tot, dep, res, sp, iv);
  const totalC = pm === 'total' ? tot : dep + res;
  const det = pm === 'mixto'
    ? `<div class="rrow"><span class="rl" style="padding-left:10px">— Depósito datáfono</span><span class="rv">${dep.toFixed(2)} €</span></div>
       <div class="rrow"><span class="rl" style="padding-left:10px">— Efectivo al estudio</span><span class="rv">${res.toFixed(2)} €</span></div>`
    : '';
  document.getElementById('mres').style.display = 'block';
  document.getElementById('mres').innerHTML = `<div class="mresbox">
    <div class="rrow"><span class="rl">Total cobrado al estudio</span><span class="rv">${totalC.toFixed(2)} €</span></div>
    ${det}
    <div class="rrow"><span class="rl">IVA descontado (${iv}%${pm === 'mixto' ? ' solo depósito' : ''})</span><span class="rv" style="color:var(--wd)">-${r.ivaAmt.toFixed(2)} €</span></div>
    <div class="rrow"><span class="rl">Base neta a repartir</span><span class="rv">${r.base.toFixed(2)} €</span></div>
    <div class="rdiv"></div>
    <div class="rrow big"><span class="rl">Estudio se queda (${sp}%)</span><span class="rv">${r.ss.toFixed(2)} €</span></div>
    <div class="rrow big"><span class="rl">Estudio paga al artista (${100 - sp}%)</span><span class="rv">${r.as.toFixed(2)} €</span></div>
    <div class="rdiv"></div>
    <div class="liqbox">
      <div><div class="liqtxt">El estudio transfiere al artista</div><div class="liqsub">${r.base.toFixed(2)} € × ${100 - sp}%</div></div>
      <div class="liqamt">${r.as.toFixed(2)} €</div>
    </div>
  </div>`;
}

function openTT(aid) {
  eA = aid; eT = null; pm = 'total';
  document.getElementById('mttl').textContent = 'Nuevo tatuaje';
  ['m-tot','m-dep','m-res'].forEach(i => document.getElementById(i).value = '');
  document.getElementById('mres').style.display = 'none';
  setPM('total');
  document.getElementById('ttm').style.display = 'flex';
  setTimeout(() => document.getElementById('m-tot').focus(), 60);
}

function openETT(aid, tid) {
  eA = aid; eT = tid;
  const k = S.cd + '_' + aid;
  const t = (S.tats[k] || []).find(x => x.id === tid);
  if (!t) return;
  document.getElementById('mttl').textContent = 'Editar tatuaje';
  pm = t.mode || 'total';
  setPM(pm);
  if (pm === 'total') document.getElementById('m-tot').value = t.ti || '';
  else { document.getElementById('m-dep').value = t.dep || ''; document.getElementById('m-res').value = t.res || ''; }
  document.getElementById('ttm').style.display = 'flex';
  calcM();
}

function closeTT() { document.getElementById('ttm').style.display = 'none'; }

function saveTT() {
  const iv = parseFloat(document.getElementById('ivainp').value) || 21;
  const art = S.artists.find(x => x.id === eA);
  const sp = art && art.cs != null ? art.cs : S.gs;
  let ti = 0, dep = 0, res = 0;
  if (pm === 'total') { ti = parseFloat(document.getElementById('m-tot').value) || 0; if (!ti) return; }
  else { dep = parseFloat(document.getElementById('m-dep').value) || 0; res = parseFloat(document.getElementById('m-res').value) || 0; if (!dep && !res) return; }
  const r = calcLogic(pm, ti, dep, res, sp, iv);
  const k = S.cd + '_' + eA;
  if (!S.tats[k]) S.tats[k] = [];
  const e = { id: eT || Date.now(), mode: pm, ti, dep, res, sp, iv, ...r };
  if (eT) { const i = S.tats[k].findIndex(x => x.id === eT); if (i >= 0) S.tats[k][i] = e; }
  else S.tats[k].push(e);
  closeTT(); save();
}

function delTT(aid, tid) {
  const k = S.cd + '_' + aid;
  S.tats[k] = (S.tats[k] || []).filter(t => t.id !== tid);
  save();
}

// ─── ARTISTAS ─────────────────────────────────────────────────
function openAA() {
  document.getElementById('aan').value = '';
  document.getElementById('aas').value = '';
  document.getElementById('aam').style.display = 'flex';
  setTimeout(() => document.getElementById('aan').focus(), 60);
}

function doAA() {
  const n = document.getElementById('aan').value.trim();
  if (!n) return;
  const sv = document.getElementById('aas').value;
  const cs = sv !== '' ? parseFloat(sv) : null;
  if (!S.artists.find(a => a.name.toLowerCase() === n.toLowerCase()))
    S.artists.push({ id: Date.now(), name: n, cs });
  document.getElementById('aam').style.display = 'none';
  save();
}

function delA(id) {
  if (!confirm('¿Eliminar este artista y todos sus datos?')) return;
  S.artists = S.artists.filter(a => a.id !== id);
  save();
}

function togA(id) {
  const b = document.getElementById('ab-' + id);
  const i = document.getElementById('ai-' + id);
  const o = b.style.display !== 'none';
  b.style.display = o ? 'none' : 'block';
  i.classList.toggle('open', !o);
}

// ─── CONTROLES ────────────────────────────────────────────────
function upSplit(v) {
  S.gs = parseInt(v);
  document.getElementById('spvEl').textContent = v + '% · ' + (100 - v) + '%';
  document.querySelectorAll('.qb').forEach(b => b.classList.remove('active'));
  save();
}
function setSplit(v) {
  S.gs = v;
  document.getElementById('sslider').value = v;
  document.getElementById('spvEl').textContent = v + '% · ' + (100 - v) + '%';
  document.querySelectorAll('.qb').forEach(b => b.classList.toggle('active', parseInt(b.textContent) === v));
  save();
}
function chDay(d) { const dt = new Date(S.cd + 'T12:00:00'); dt.setDate(dt.getDate() + d); S.cd = dt.toISOString().split('T')[0]; document.getElementById('dpick').value = S.cd; save(); }
function setD(v) { S.cd = v; save(); }
function chWeek(d) { S.wo += d; save(); }
function chMonth(d) { S.mo += d; save(); }
function ini(n) { return n.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2); }
function fmtD(s) { return new Date(s + 'T12:00:00').toLocaleDateString('es-ES', { weekday: 'short', day: 'numeric', month: 'short' }); }
function fmtMY(y, m) { return new Date(y, m, 1).toLocaleDateString('es-ES', { month: 'long', year: 'numeric' }); }
function setV(v) {
  S.cv = v;
  ['dia','semana','mes','artistas'].forEach(x => {
    document.getElementById('v-' + x).style.display = x === v ? 'block' : 'none';
    document.getElementById('t-' + x).classList.toggle('active', x === v);
  });
  render();
}
function setFS(id) { S.fS = id; save(); }
function setFM(id) { S.fM = id; save(); }

// ─── DATOS ────────────────────────────────────────────────────
function getDayT(date, aid) {
  let b = 0, iv = 0, ss = 0, as = 0;
  const ids = aid ? [aid] : S.artists.map(a => a.id);
  ids.forEach(id => {
    const k = date + '_' + id;
    (S.tats[k] || []).forEach(t => {
      const tc = t.mode === 'total' ? t.ti : (t.dep + t.res);
      b += tc; iv += t.ivaAmt; ss += t.ss; as += t.as;
    });
  });
  return { b, iv, ss, as };
}
function getWD() {
  const n = new Date(); n.setDate(n.getDate() + S.wo * 7);
  const dw = n.getDay(), m = new Date(n); m.setDate(n.getDate() - (dw === 0 ? 6 : dw - 1));
  return Array.from({ length: 7 }, (_, i) => { const d = new Date(m); d.setDate(m.getDate() + i); return d.toISOString().split('T')[0]; });
}
function getMD() {
  const n = new Date(); n.setMonth(n.getMonth() + S.mo);
  const y = n.getFullYear(), m = n.getMonth(), days = new Date(y, m + 1, 0).getDate();
  return { y, m, dates: Array.from({ length: days }, (_, i) => (new Date(y, m, i + 1)).toISOString().split('T')[0]) };
}
function mkSG(el, b, iv, ss, as) {
  el.innerHTML = `
    <div class="sc sc-main gc"><div class="sl">Facturación bruta</div><div class="sv">${b.toFixed(2)} €</div></div>
    <div class="sc sc-iva gc"><div class="sl">IVA pagado</div><div class="sv">${iv.toFixed(2)} €</div></div>
    <div class="sc sc-s gc"><div class="sl">Para el estudio</div><div class="sv">${ss.toFixed(2)} €</div></div>
    <div class="sc sc-a gc"><div class="sl">Para artistas</div><div class="sv">${as.toFixed(2)} €</div></div>`;
}
function mkAF(el, cur, fn) {
  el.innerHTML = '<button class="afbtn' + (cur === null ? ' active' : '') + '" onclick="' + fn + '(null)">Todos</button>' +
    S.artists.map(a => `<button class="afbtn${cur === a.id ? ' active' : ''}" onclick="${fn}(${a.id})">${a.name}</button>`).join('');
}

// ─── RENDER ───────────────────────────────────────────────────
function render() {
  document.getElementById('sslider').value = S.gs;
  document.getElementById('spvEl').textContent = S.gs + '% · ' + (100 - S.gs) + '%';
  document.getElementById('ivainp').value = S.iva;
  document.querySelectorAll('.qb').forEach(b => b.classList.toggle('active', parseInt(b.textContent) === S.gs));
  document.getElementById('dlbl').textContent = S.cd === td() ? 'Hoy' : fmtD(S.cd);
  document.getElementById('dpick').value = S.cd;
  if (S.cv === 'dia') rDia();
  else if (S.cv === 'semana') rSem();
  else if (S.cv === 'mes') rMes();
  else rArt();
}

function rDia() {
  const t = getDayT(S.cd, null); mkSG(document.getElementById('sg'), t.b, t.iv, t.ss, t.as);
  const el = document.getElementById('alist');
  if (!S.artists.length) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-plus" onclick="openAA()">+</div>
      <div class="empty-txt">Aún no hay artistas para hoy</div>
      <div class="empty-sub">Pulsa el + para añadir el primer artista</div>
    </div>`;
    return;
  }
  el.innerHTML = S.artists.map(a => {
    const k = S.cd + '_' + a.id, tts = S.tats[k] || [], sp = a.cs != null ? a.cs : S.gs;
    let ae = 0, se = 0, iv = 0;
    tts.forEach(t => { ae += t.as; se += t.ss; iv += t.ivaAmt; });
    const rows = tts.map((t, i) => {
      const desc = t.mode === 'total'
        ? `Pago único ${(t.ti || 0).toFixed(2)} €`
        : `Depósito ${(t.dep || 0).toFixed(2)} € + Efectivo ${(t.res || 0).toFixed(2)} €`;
      return `<div class="ttrow">
        <div><div class="ttn">Tatuaje ${i + 1}</div><div class="ttd">${desc}</div></div>
        <span class="chip ci">-${t.ivaAmt.toFixed(2)} €</span>
        <span class="chip cs">${t.ss.toFixed(2)} €</span>
        <span class="chip ca">${t.as.toFixed(2)} €</span>
        <div class="ttacts">
          <button class="ib" onclick="openETT(${a.id},${t.id})">✏️</button>
          <button class="ib del" onclick="delTT(${a.id},${t.id})">🗑️</button>
        </div>
      </div>`;
    }).join('');
    const emptyTT = !tts.length ? `<div style="display:flex;flex-direction:column;align-items:center;padding:24px 0;gap:10px">
      <div class="empty-plus" onclick="openTT(${a.id})" style="width:52px;height:52px;font-size:24px">+</div>
      <div style="font-size:12px;color:var(--txt3);font-weight:600">Sin tatuajes hoy · pulsa el + para añadir</div>
    </div>` : '';
    return `<div class="acard gc">
      <div class="ahdr" onclick="togA(${a.id})">
        <div class="avt">${ini(a.name)}</div>
        <div class="ain"><div class="aname">${a.name}</div><div class="asub">${tts.length} tatuaje${tts.length !== 1 ? 's' : ''} · Split ${sp}/${100 - sp}</div></div>
        <div class="aearns"><div class="aval">${ae.toFixed(2)} €</div><div class="albl">el estudio le paga</div></div>
        <button class="ib del no-print" onclick="event.stopPropagation();delA(${a.id})" style="margin-right:4px" title="Eliminar artista">✕</button>
        <div class="exi" id="ai-${a.id}">▶</div>
      </div>
      <div id="ab-${a.id}" style="display:none">
        <div class="ttbl">
          ${tts.length ? `<div class="tthd"><span>Tatuaje</span><span>IVA</span><span>Estudio</span><span>Artista</span><span></span></div>${rows}` : ''}
          ${emptyTT}
          ${tts.length ? `<button class="addtt no-print" onclick="openTT(${a.id})">+ Añadir tatuaje</button>` : ''}
        </div>
        ${tts.length ? `<div class="afooter">
          <span class="fp" style="background:rgba(82,84,186,0.09);color:var(--v800);border:1.5px solid rgba(82,84,186,0.17)">Estudio retiene ${se.toFixed(2)} €</span>
          <span class="fp" style="background:var(--wbg);color:var(--wd);border:1.5px solid var(--wbd)">IVA ${iv.toFixed(2)} €</span>
          <span class="liqb">Pagar al artista ${ae.toFixed(2)} €</span>
        </div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function rSem() {
  const dates = getWD();
  const mon = new Date(dates[0] + 'T12:00:00'), sun = new Date(dates[6] + 'T12:00:00');
  document.getElementById('wlbl').textContent = mon.toLocaleDateString('es-ES', { day: 'numeric', month: 'short' }) + ' – ' + sun.toLocaleDateString('es-ES', { day: 'numeric', month: 'short', year: 'numeric' });
  let tb = 0, ti = 0, ts = 0, ta = 0;
  dates.forEach(d => { const x = getDayT(d, S.fS); tb += x.b; ti += x.iv; ts += x.ss; ta += x.as; });
  mkSG(document.getElementById('sg-s'), tb, ti, ts, ta);
  mkAF(document.getElementById('af-s'), S.fS, 'setFS');
  const el = document.getElementById('hist-s'), days = dates.filter(d => getDayT(d, S.fS).b > 0);
  if (!days.length) { el.innerHTML = `<div class="empty-state"><div class="empty-plus" style="cursor:default;pointer-events:none">+</div><div class="empty-txt">Sin registros esta semana</div></div>`; return; }
  el.innerHTML = days.map(d => {
    const x = getDayT(d, S.fS);
    const ar = !S.fS ? S.artists.filter(a => (S.tats[d + '_' + a.id] || []).length > 0).map(a => {
      let ae = 0; (S.tats[d + '_' + a.id] || []).forEach(t => ae += t.as);
      return `<div class="arow"><span style="font-weight:700;color:var(--txt)">${a.name}</span><span style="color:var(--v700);font-family:var(--fn)">${ae.toFixed(2)} €</span></div>`;
    }).join('') : '';
    return `<div class="hcard gc">
      <div class="hdate">${fmtD(d)}</div>
      <div class="hchips">
        <span class="hpill" style="background:rgba(82,84,186,0.09);color:var(--v800);border:1.5px solid rgba(82,84,186,0.16)">Estudio ${x.ss.toFixed(2)} €</span>
        <span class="hpill" style="background:rgba(124,127,219,0.1);color:var(--v700);border:1.5px solid rgba(124,127,219,0.2)">Artistas ${x.as.toFixed(2)} €</span>
        <span class="hpill" style="background:var(--wbg);color:var(--wd);border:1.5px solid var(--wbd)">IVA ${x.iv.toFixed(2)} €</span>
      </div>
      ${ar ? `<div style="margin-top:10px">${ar}</div>` : ''}
    </div>`;
  }).join('');
}

function rMes() {
  const { y, m, dates } = getMD();
  document.getElementById('mlbl').textContent = fmtMY(y, m);
  let tb = 0, ti = 0, ts = 0, ta = 0;
  dates.forEach(d => { const x = getDayT(d, S.fM); tb += x.b; ti += x.iv; ts += x.ss; ta += x.as; });
  mkSG(document.getElementById('sg-m'), tb, ti, ts, ta);
  mkAF(document.getElementById('af-m'), S.fM, 'setFM');
  const el = document.getElementById('hist-m');
  if (tb === 0) { el.innerHTML = `<div class="empty-state"><div class="empty-plus" style="cursor:default;pointer-events:none">+</div><div class="empty-txt">Sin registros este mes</div></div>`; return; }
  const active = dates.filter(d => getDayT(d, S.fM).b > 0);
  if (S.fM) {
    let tot = 0;
    const rows = active.map(d => { const x = getDayT(d, S.fM); tot += x.as; return `<div class="arow"><span style="font-weight:700">${fmtD(d)}</span><div><span class="chip cs" style="margin-right:4px">${x.ss.toFixed(2)} €</span><span class="chip ca">${x.as.toFixed(2)} €</span></div></div>`; }).join('');
    el.innerHTML = `<div class="gc" style="padding:16px 20px;border-radius:var(--r)">${rows}<div style="padding:12px 0 0;display:flex;justify-content:space-between;border-top:1.5px solid rgba(124,127,219,0.1);margin-top:8px"><span style="font-weight:800;color:var(--txt2)">Total a pagar al artista</span><span style="font-family:var(--fn);font-size:20px;color:var(--v800)">${tot.toFixed(2)} €</span></div></div>`;
  } else {
    el.innerHTML = '<div class="gc" style="padding:16px 20px;border-radius:var(--r)">' +
      S.artists.filter(a => { let h = false; dates.forEach(d => { if ((S.tats[d + '_' + a.id] || []).length) h = true; }); return h; }).map(a => {
        let ae = 0, se = 0;
        dates.forEach(d => { (S.tats[d + '_' + a.id] || []).forEach(t => { ae += t.as; se += t.ss; }); });
        return `<div class="arow"><div><div style="font-weight:800;color:var(--txt)">${a.name}</div><div style="font-size:11px;color:var(--txt3)">Estudio retiene ${se.toFixed(2)} €</div></div><div style="text-align:right"><div style="font-family:var(--fn);font-size:19px;color:var(--v800)">${ae.toFixed(2)} €</div><div style="font-size:10px;color:var(--txt3)">el estudio le paga</div></div></div>`;
      }).join('') + '</div>';
  }
}

function rArt() {
  const el = document.getElementById('amgr');
  if (!S.artists.length) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-plus" onclick="openAA()">+</div>
      <div class="empty-txt">Sin artistas todavía</div>
      <div class="empty-sub">Pulsa el + para añadir el primer artista</div>
    </div>`;
    return;
  }
  el.innerHTML = S.artists.map(a => {
    let tot = 0;
    Object.keys(S.tats).filter(k => k.endsWith('_' + a.id)).forEach(k => S.tats[k].forEach(t => tot += t.as));
    const sp = a.cs != null ? a.cs : S.gs;
    return `<div class="gc" style="padding:16px 20px;border-radius:var(--r);margin-bottom:10px;display:flex;align-items:center;gap:14px">
      <div class="avt">${ini(a.name)}</div>
      <div style="flex:1"><div class="aname">${a.name}</div><div class="asub">Split ${sp}/${100 - sp} · Acumulado a pagar: <span style="color:var(--v700);font-family:var(--fn)">${tot.toFixed(2)} €</span></div></div>
      <button class="btn btn-d sm" onclick="delA(${a.id})">Eliminar</button>
    </div>`;
  }).join('');
}

// ─── IMPRIMIR ─────────────────────────────────────────────────
function printDay() {
  document.getElementById('ph-d').textContent = new Date(S.cd + 'T12:00:00').toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  S.artists.forEach(a => { const b = document.getElementById('ab-' + a.id); if (b) b.style.display = 'block'; });
  setTimeout(() => window.print(), 120);
}

// ─── INIT ─────────────────────────────────────────────────────
load();
setV('dia');

// Service Worker para PWA offline
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
